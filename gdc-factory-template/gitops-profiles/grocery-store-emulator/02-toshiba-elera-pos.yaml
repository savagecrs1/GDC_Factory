# Simulation: Toshiba ELERA Cloud-Native POS Commerce Engine
# Network Target: Non-PCI VLAN 3130 (172.16.0.0/16)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: toshiba-elera-pos-engine
  namespace: store-ops-non-pci
  labels:
    app: toshiba-elera
    tier: commerce-engine
    vlan: "3130"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: toshiba-elera
  template:
    metadata:
      labels:
        app: toshiba-elera
        tier: commerce-engine
        vlan: "3130"
      annotations:
        k8s.v1.cni.cncf.io/networks: gke-system/non-pci-network-3130
    spec:
      containers:
      - name: elera-core
        image: python:3.11-alpine
        command: ["python3", "-c"]
        args:
        - |
          import http.server, json, urllib.request
          class H(http.server.BaseHTTPRequestHandler):
            def do_POST(self):
              try:
                req = urllib.request.Request(
                  "http://pinpad-tokenization-service.cde-pci-scope.svc.cluster.local:8443/",
                  data=b'{"action":"emv_auth"}',
                  headers={'Content-Type':'application/json'},
                  method='POST'
                )
                with urllib.request.urlopen(req, timeout=3) as r:
                  pci_data = json.loads(r.read().decode())
              except Exception as e:
                pci_data = {"status": "OFFLINE_SIMULATION", "error": str(e), "auth_code": "SIM_OK_10101"}
              
              self.send_response(200)
              self.send_header('Content-type', 'application/json')
              self.end_headers()
              checkout_receipt = {
                "transaction_id": "POS_TX_2026_99814",
                "store": "Kroger Store 002 (Hybrid Edge)",
                "vlan_source": "Non-PCI Store Ops VLAN 3130",
                "cashier": "Register #04 - Auto Checkout",
                "items": [
                  {"sku": "000111104285", "name": "Kroger Gallon Whole Milk", "price": "$3.29"},
                  {"sku": "000111108421", "name": "Private Selection Honey Turkey", "price": "$7.49"},
                  {"sku": "000111101923", "name": "Honeycrisp Apples (3 lbs)", "price": "$5.99"},
                  {"sku": "000111109912", "name": "Kroger Large Eggs 18ct", "price": "$3.89"}
                ],
                "subtotal": "$20.66",
                "tax": "$1.45",
                "total_paid": "$22.11",
                "payment_gateway_response": pci_data
              }
              self.wfile.write(json.dumps(checkout_receipt, indent=2).encode())
            def do_GET(self): self.do_POST()
          print("Toshiba ELERA POS Commerce Engine listening on port 80...")
          http.server.HTTPServer(('0.0.0.0', 80), H).serve_forever()
        env:
        - name: STORE_ID
          value: "kroger-store-002"
        - name: COMMERCE_MODE
          value: "ELERA_MICROSERVICE_V3"
        - name: VLAN_TARGET
          value: "3130_NON_PCI"
        ports:
        - containerPort: 80
          name: http-pos
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: toshiba-elera-service
  namespace: store-ops-non-pci
  labels:
    app: toshiba-elera
spec:
  type: ClusterIP
  selector:
    app: toshiba-elera
  ports:
  - port: 8080
    targetPort: 80
    name: commerce-api
