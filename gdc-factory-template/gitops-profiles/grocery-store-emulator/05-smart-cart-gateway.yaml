# Simulation: Kroger Smart Cart AI Vision & Micro-Fulfillment Center (MFC) Telemetry
# Network Target: Default / Store Operations Overlay

apiVersion: apps/v1
kind: Deployment
metadata:
  name: kroger-smart-cart-gateway
  namespace: mfc-robotics
  labels:
    app: smart-cart-vision
    tier: edge-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smart-cart-vision
  template:
    metadata:
      labels:
        app: smart-cart-vision
        tier: edge-ai
    spec:
      containers:
      - name: vision-telemetry
        image: nginx:alpine
        env:
        - name: AI_ENGINE
          value: "EDGE_TENSORFLOW_LITE"
        - name: CART_FLEET_SIZE
          value: "150_UNITS"
        - name: CAMERA_FEED_FPS
          value: "30"
        ports:
        - containerPort: 80
          name: telemetry-port
---
apiVersion: v1
kind: Service
metadata:
  name: smart-cart-telemetry-service
  namespace: mfc-robotics
  labels:
    app: smart-cart-vision
spec:
  type: ClusterIP
  selector:
    app: smart-cart-vision
  ports:
  - port: 9090
    targetPort: 80
    name: metrics-api
