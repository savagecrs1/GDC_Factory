apiVersion: apps/v1
kind: Deployment
metadata:
  name: database-service
  namespace: ngpos-apex
  labels:
    app: database-service
    app.kubernetes.io/part-of: cluster-performance-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: database-service
  template:
    metadata:
      labels:
        app: database-service
    spec:
      imagePullSecrets:
      - name: jfrog-secret
      containers:
      - name: database-service
        image: krogertechnology-docker-prod.jfrog.io/ecs_docker_repo/perf-database-service:mongo-v4
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: DB_HOST
          value: mongodb.ngpos-apex.svc.cluster.local
        - name: DB_PORT
          value: "27017"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: mongodb-credentials
              key: MONGO_INITDB_ROOT_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-credentials
              key: MONGO_INITDB_ROOT_PASSWORD
        - name: DB_MAX_CONNS
          value: "150"
        - name: DB_MAX_IDLE_CONNS
          value: "75"
        resources:
          requests:
            cpu: "700m"
            memory: "256Mi"
          limits:
            memory: "1Gi"
        startupProbe:
          httpGet:
            path: /healthz
            port: 8080
          periodSeconds: 5
          failureThreshold: 18
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: database-service
  namespace: ngpos-apex
  labels:
    app: database-service
spec:
  type: ClusterIP
  selector:
    app: database-service
  ports:
  - port: 8080
    targetPort: 8080
    name: http
