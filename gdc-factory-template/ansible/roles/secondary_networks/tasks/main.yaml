---
- name: Create working directory for secondary networks
  file:
    path: "{{ gem_home }}/bmctl-workspace/{{ cluster_name }}/secondary-networks"
    state: directory
    owner: "{{ gem_user }}"
    group: "{{ gem_user }}"
    mode: '0755'

- name: Render Network Custom Resources
  template:
    src: network.yaml.j2
    dest: "{{ gem_home }}/bmctl-workspace/{{ cluster_name }}/secondary-networks/network-{{ item.name }}.yaml"
    owner: "{{ gem_user }}"
    group: "{{ gem_user }}"
    mode: '0644'
  loop: "{{ secondary_networks }}"

- name: Render ClusterCIDRConfig Custom Resources
  template:
    src: clustercidrconfig.yaml.j2
    dest: "{{ gem_home }}/bmctl-workspace/{{ cluster_name }}/secondary-networks/clustercidr-{{ item.name }}.yaml"
    owner: "{{ gem_user }}"
    group: "{{ gem_user }}"
    mode: '0644'
  loop: "{{ secondary_networks }}"

- name: Render MetalLB IPAddressPool and L2Advertisement
  template:
    src: metallb.yaml.j2
    dest: "{{ gem_home }}/bmctl-workspace/{{ cluster_name }}/secondary-networks/metallb-{{ item.name }}.yaml"
    owner: "{{ gem_user }}"
    group: "{{ gem_user }}"
    mode: '0644'
  loop: "{{ secondary_networks }}"

- name: Apply Secondary Network Manifests
  shell: |
    export KUBECONFIG="{{ gem_home }}/bmctl-workspace/{{ cluster_name }}/{{ cluster_name }}-kubeconfig"
    kubectl apply -f {{ gem_home }}/bmctl-workspace/{{ cluster_name }}/secondary-networks/
  register: kubectl_apply
  changed_when: "'created' in kubectl_apply.stdout or 'configured' in kubectl_apply.stdout"
