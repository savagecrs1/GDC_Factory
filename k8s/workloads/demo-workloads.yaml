---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gdc-edge-nginx
  namespace: default
  labels:
    app: gdc-edge-nginx
    tier: web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gdc-edge-nginx
  template:
    metadata:
      labels:
        app: gdc-edge-nginx
        tier: web
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: gdc-edge-nginx-svc
  namespace: default
spec:
  type: NodePort
  selector:
    app: gdc-edge-nginx
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gdc-edge-redis
  namespace: default
  labels:
    app: gdc-edge-redis
    tier: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gdc-edge-redis
  template:
    metadata:
      labels:
        app: gdc-edge-redis
        tier: cache
    spec:
      containers:
      - name: redis
        image: redis:7.2-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: gdc-edge-redis-svc
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: gdc-edge-redis
  ports:
  - port: 6379
    targetPort: 6379
