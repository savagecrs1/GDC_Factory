---
- name: Ensure standard user exists
  user:
    name: "{{ gdc_user }}"
    state: present
    shell: /bin/bash

- name: Ensure docker group exists
  group:
    name: docker
    state: present

- name: Add user to docker group
  user:
    name: "{{ gdc_user }}"
    groups: docker
    append: yes

- name: Grant passwordless sudo to standard user
  copy:
    dest: "/etc/sudoers.d/{{ gdc_user }}"
    content: "{{ gdc_user }} ALL=(ALL) NOPASSWD: ALL"
    mode: '0440'

- name: Add workstation public key to authorized_keys
  authorized_key:
    user: "{{ gdc_user }}"
    state: present
    key: "{{ lookup('file', '/tmp/ws_id_rsa.pub') }}"
