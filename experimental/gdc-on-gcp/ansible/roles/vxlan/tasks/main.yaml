---
- name: Install required packages
  apt:
    name:
      - jq
      - acl
    state: present
    update_cache: yes

- name: Ensure clean state by deleting existing vxlan0
  shell: ip link delete vxlan0
  failed_when: false
  changed_when: false

- name: Create vxlan0 interface
  shell: |
    ip link add vxlan0 type vxlan id {{ vxlan_id }} dev ens4 dstport 4789
    ip link set dev vxlan0 mtu 1410
  register: vxlan_create

- name: Append FDB entries for other nodes
  shell: |
    bridge fdb append to 00:00:00:00:00:00 dst {{ hostvars[item].internal_ip }} dev vxlan0
  loop: "{{ groups['gdc_nodes'] }}"
  when: "item != inventory_hostname"

- name: Assign IP address to vxlan0 and bring interface up
  shell: |
    ip addr add {{ vxlan_ip }}/24 dev vxlan0
    ip link set up dev vxlan0
  register: ip_assign
