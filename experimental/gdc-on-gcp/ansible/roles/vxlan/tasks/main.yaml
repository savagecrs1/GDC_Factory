---
- name: Disable old GDC VXLAN service if it exists
  ansible.builtin.systemd:
    name: gdc-vxlan.service
    enabled: no
    state: stopped
  ignore_errors: true

- name: Template the VXLAN setup script
  ansible.builtin.template:
    src: setup-gem-vxlan.sh.j2
    dest: /usr/local/bin/setup-gem-vxlan.sh
    mode: '0755'
    owner: root
    group: root

- name: Template the systemd service for VXLAN persistence
  ansible.builtin.template:
    src: gem-vxlan.service.j2
    dest: /etc/systemd/system/gem-vxlan.service
    mode: '0644'
    owner: root
    group: root

- name: Enable and start the GEM VXLAN service
  ansible.builtin.systemd:
    name: gem-vxlan.service
    enabled: yes
    state: started
    daemon_reload: yes
