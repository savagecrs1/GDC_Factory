apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: resource-limits
spec:
  steps:
  - try:
    - apply:
        file: priorityclasses.yaml
    - apply:
        file: pod-high-priority.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'forbidden') || contains($error, 'denied')): true
    - apply:
        file: pod-low-priority.yaml
