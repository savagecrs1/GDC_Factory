apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: resource-limits
spec:
  steps:
  - try:
    - command:
        entrypoint: kubectl
        args: ["apply", "-f", "pod-no-limits.yaml"]
        check:
          (contains($stderr, 'is forbidden') || contains($stderr, 'denied by admission webhook')): true
    - command:
        entrypoint: kubectl
        args: ["apply", "-f", "pod-with-limits.yaml"]
        check:
          (size($stderr) == 0): true
