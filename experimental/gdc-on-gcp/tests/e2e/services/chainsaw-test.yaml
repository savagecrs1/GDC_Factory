apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: service-restrictions
spec:
  steps:
  - try:
    - apply:
        file: pod.yaml
    - apply:
        file: service-nodeport.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'forbidden') || contains($error, 'denied')): true
    - apply:
        file: service-external-ips.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'forbidden') || contains($error, 'denied')): true
