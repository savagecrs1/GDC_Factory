apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: service-restrictions
spec:
  steps:
  - try:
    - command:
        entrypoint: kubectl
        args: ["run", "dummy-for-expose-tdd", "--image=nginx", "--labels=testsuite=true"]
    - command:
        entrypoint: kubectl
        args: ["expose", "pod", "dummy-for-expose-tdd", "--type=NodePort", "--name=forbidden-nodeport-tdd", "--port=80"]
        check:
          (contains($stderr, 'is forbidden') || contains($stderr, 'denied by admission webhook')): true
    - apply:
        file: service-external-ips.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'is forbidden') || contains($error, 'denied by admission webhook')): true
