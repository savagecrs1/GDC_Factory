apiVersion: v1
kind: Pod
metadata:
  name: allowed-hostpath-tdd
  labels:
    testsuite: "true"
spec:
  automountServiceAccountToken: false
  containers:
  - name: nginx
    image: nginx
    volumeMounts:
    - mountPath: /sys-devices
      name: sys-devices
  volumes:
  - name: sys-devices
    hostPath:
      path: /sys/devices
