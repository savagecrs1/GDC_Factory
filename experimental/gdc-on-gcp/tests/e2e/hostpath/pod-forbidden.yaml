apiVersion: v1
kind: Pod
metadata:
  name: forbidden-hostpath-tdd
  labels:
    testsuite: "true"
spec:
  automountServiceAccountToken: false
  containers:
  - name: nginx
    image: nginx
    volumeMounts:
    - mountPath: /etc-k8s
      name: etc-k8s
  volumes:
  - name: etc-k8s
    hostPath:
      path: /etc/kubernetes
