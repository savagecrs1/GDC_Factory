apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: hostpath-restriction
spec:
  steps:
  - try:
    - apply:
        file: pod-forbidden.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'forbidden') || contains($error, 'denied')): true
    - apply:
        file: pod-allowed.yaml
