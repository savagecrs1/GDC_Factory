apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: restricted-namespaces
spec:
  steps:
  - try:
    - apply:
        file: tenant-rbac-setup.yaml
    - apply:
        file: namespaces-setup.yaml
    
    # 1. Creation Restrictions (Workloads)
    - apply:
        file: workloads-setup.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'forbidden') || contains($error, 'denied')): true

    # 2. Standard Creation Restrictions (CLI run)
    - apply:
        file: pod-forbidden-ai-system.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'forbidden') || contains($error, 'denied')): true
