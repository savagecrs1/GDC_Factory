apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: security-context
spec:
  steps:
  - try:
    - apply:
        file: pod-hostnetwork.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'forbidden') || contains($error, 'denied')): true
    - apply:
        file: pod-privileged.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'forbidden') || contains($error, 'denied')): true
