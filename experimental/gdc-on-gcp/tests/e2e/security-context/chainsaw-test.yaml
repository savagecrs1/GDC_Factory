apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: security-context
spec:
  steps:
  - try:
    - command:
        entrypoint: kubectl
        args: ["apply", "-f", "pod-hostnetwork.yaml"]
        check:
          (contains($stderr, 'is forbidden') || contains($stderr, 'denied by admission webhook')): true
    - command:
        entrypoint: kubectl
        args: ["apply", "-f", "pod-privileged.yaml"]
        check:
          (contains($stderr, 'is forbidden') || contains($stderr, 'denied by admission webhook')): true
