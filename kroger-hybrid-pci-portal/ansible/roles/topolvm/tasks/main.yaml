---
- name: Create TopoLVM configuration directory
  file:
    path: "{{ gem_home }}/topolvm"
    state: directory
    owner: "{{ gem_user }}"
    group: "{{ gem_user }}"

- name: Render TopoLVM values
  template:
    src: topolvm-values.yaml.j2
    dest: "{{ gem_home }}/topolvm/values.yaml"
    owner: "{{ gem_user }}"
    group: "{{ gem_user }}"

- name: Add TopoLVM Helm repository
  become_user: "{{ gem_user }}"
  command: helm repo add topolvm https://topolvm.github.io/topolvm

- name: Update Helm repositories
  become_user: "{{ gem_user }}"
  command: helm repo update

- name: Deploy TopoLVM via Helm
  become_user: "{{ gem_user }}"
  command: >
    helm upgrade --install topolvm topolvm/topolvm
    --namespace topolvm-system
    --create-namespace
    -f {{ gem_home }}/topolvm/values.yaml
    --kubeconfig {{ gem_home }}/bmctl-workspace/{{ cluster_name }}/{{ cluster_name }}-kubeconfig
