apiVersion: apps/v1
kind: Deployment
metadata:
  name: database-service
  namespace: ngpos-platform
  labels:
    app: database-service
    app.kubernetes.io/part-of: cluster-performance-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: database-service
  template:
    metadata:
      labels:
        app: database-service
    spec:
      imagePullSecrets:
      - name: jfrog-secret
      containers:
      - name: database-service
        image: krogertechnology-docker-prod.jfrog.io/ecs_docker_repo/perf-database-service:v2
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: DB_HOST
          value: postgres
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_PASSWORD
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_DB
        - name: DB_SSLMODE
          value: disable
        - name: DB_MAX_CONNS
          value: "150"
        - name: DB_MAX_IDLE_CONNS
          value: "75"
        resources:
          requests:
            cpu: "1000m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "2Gi"
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: database-service
  namespace: ngpos-platform
  labels:
    app: database-service
spec:
  type: ClusterIP
  selector:
    app: database-service
  ports:
  - port: 8080
    targetPort: 8080
    name: http
