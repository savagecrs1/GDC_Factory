apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dig-pvc
  namespace: default
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: robin
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dig-test
  namespace: default
  labels:
    app: dig-test
    dnsconfig-injector: enabled
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: dig-test
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: dig-test
        dnsconfig-injector: enabled
    spec:
      containers:
      - name: dig-test
        image: krogertechnology-docker-prod.jfrog.io/ecs_docker_repo/dig:23
        env:
        - name: TUNA_SERVER
          value: tuna.ci003.kroger.com
        - name: LOG_DIR
          value: /logs
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          protocol: TCP
        resources:
          limits:
            cpu: "1"

            memory: 1Gi
          requests:
            cpu: 256m
            memory: 256Mi
        volumeMounts:
        - name: logs-volume
          mountPath: /logs
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      volumes:
      - name: logs-volume
        persistentVolumeClaim:
          claimName: dig-pvc
      dnsPolicy: ClusterFirst
      imagePullSecrets:
      - name: jfrog-secret
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
