[defaults]
inventory = inventory.sh
host_key_checking = False
private_key_file = ~/.ssh/google_compute_engine
roles_path = roles
deprecation_warnings = False
forks = 5

[ssh_connection]
pipelining = True
retries = 5
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o ServerAliveInterval=15 -o ServerAliveCountMax=3
