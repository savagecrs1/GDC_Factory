---
- name: Wait for cloud-init to finish on boot
  command: cloud-init status --wait
  changed_when: false
  retries: 30
  delay: 5

- name: Install required packages
  apt:
    name:
      - jq
      - acl
      - curl
      - socat
      - conntrack
      - ipset
      - bridge-utils
      - lvm2
    state: present
    update_cache: yes
  register: apt_status
  until: apt_status is success
  delay: 10
  retries: 3

- name: Create TopoLVM partition (remaining 1300GB)
  shell:
    cmd: |
      # Only create partition 2 if it doesn't already exist
      if ! parted -s /dev/disk/by-id/google-data print | grep -q "^ 2"; then
        parted -s /dev/disk/by-id/google-data mkpart topolvm 100GB 100%
        sleep 2 # Wait for udev to populate the partition device
      fi
  become: yes

- name: Create Volume Group topolvm-vg
  shell:
    cmd: |
      if ! vgs topolvm-vg >/dev/null 2>&1; then
        vgcreate -y topolvm-vg /dev/disk/by-id/google-data-part2
      fi
  become: yes

- name: Ensure platform user exists
  user:
    name: "{{ gem_user }}"
    state: present
    shell: /bin/bash

- name: Ensure docker group exists
  group:
    name: docker
    state: present

- name: Add user to docker group
  user:
    name: "{{ gem_user }}"
    groups: docker
    append: yes

- name: Grant passwordless sudo to platform user
  copy:
    dest: "/etc/sudoers.d/{{ gem_user }}"
    content: "{{ gem_user }} ALL=(ALL) NOPASSWD: ALL"
    mode: '0440'

- name: Add workstation public key to authorized_keys
  authorized_key:
    user: "{{ gem_user }}"
    state: present
    key: "{{ lookup('file', '/tmp/ws_id_rsa.pub') }}"
  when: lookup('file', '/tmp/ws_id_rsa.pub', errors='ignore') | length > 0

- name: Configure kernel modules to load at boot
  copy:
    dest: /etc/modules-load.d/gdc-modules.conf
    content: |
      vxlan
      overlay
      br_netfilter

- name: Increase inotify limits for storage providers (TopoLVM)
  sysctl:
    name: fs.inotify.max_user_instances
    value: "8192"
    sysctl_file: /etc/sysctl.d/99-inotify.conf
    state: present
    reload: yes

- name: Load kernel modules immediately
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - vxlan
    - overlay
    - br_netfilter

- name: Download and install gVisor (runsc) binary with systrap platform (b/523229462)
  shell: |
    set -e
    URL="https://storage.googleapis.com/gvisor/releases/release/latest/x86_64"
    curl -sSL -O "${URL}/runsc" || true
    curl -sSL -O "${URL}/containerd-shim-runsc-v1" || true
    if [ -f runsc ]; then
      chmod +x runsc containerd-shim-runsc-v1
      mv runsc containerd-shim-runsc-v1 /usr/local/bin/
      /usr/local/bin/runsc install -- --platform=systrap || true
    fi
  become: yes
  ignore_errors: yes
