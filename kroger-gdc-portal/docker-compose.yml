# docker-compose.kroger.yml
# Docker Compose configuration for the Kroger GDC Connected Hybrid PCI Edge Portal
version: '3.8'

services:
  kroger-portal:
    build:
      context: .
      dockerfile: Dockerfile
    image: gdc-kroger-portal:latest
    container_name: gdc-kroger-portal
    ports:
      - "3001:3001"
    volumes:
      # Mount Google Cloud SDK credentials from host so gcloud commands work without re-authenticating
      - ~/.config/gcloud:/root/.config/gcloud
      # Mount SSH keys from host for VM provisioning and Ansible access
      - ~/.ssh:/root/.ssh
      # Mount shared temporary jobs folder so build logs persist across container restarts
      - /tmp/gdc_kroger_jobs:/tmp
    environment:
      - PORT=3001
      - NODE_ENV=production
    restart: unless-stopped
