apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-service
  namespace: performance-test
  labels:
    app: cpu-service
    app.kubernetes.io/part-of: cluster-performance-test
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cpu-service
  template:
    metadata:
      labels:
        app: cpu-service
    spec:
      imagePullSecrets:
      - name: jfrog-secret
      containers:
      - name: cpu-service
        image: krogertechnology-docker-prod.jfrog.io/ecs_docker_repo/perf-cpu-service:mongo-v4
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: MEMORY_SERVICE_URL
          value: http://memory-service.performance-test.svc.cluster.local:8080
        - name: CPU_ITERATIONS
          value: "200000"
        resources:
          requests:
            cpu: "1000m"
            memory: "256Mi"
          limits:
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cpu-service
  namespace: performance-test
  labels:
    app: cpu-service
spec:
  type: ClusterIP
  selector:
    app: cpu-service
  ports:
  - port: 8080
    targetPort: 8080
    name: http
